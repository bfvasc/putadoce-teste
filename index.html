<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Putadoce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!--
    Preload the Antonio Bold woff2 (latin subset covers every character
    used in the hero titles, including "Ó") so it's fetched immediately
    instead of waiting on the stylesheet request below to discover it —
    this is what the H1 in header.js waits on via document.fonts.load()
    before revealing its text, avoiding a fallback-font flash. Re-check
    this URL against the "latin" @font-face src in
    https://fonts.googleapis.com/css2?family=Antonio:wght@700 if Google
    ever rotates the file hash.
  -->
  <link
    rel="preload"
    href="https://fonts.gstatic.com/s/antonio/v22/gNMbW3NwSYq_9WD34ngK5F8vR8T0PVyW9itPaWE.woff2"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=DM+Sans:wght@500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="components/loading/loading.css" />
  <link rel="stylesheet" href="components/header/header.css" />
  <link rel="stylesheet" href="components/about/about.css" />
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-item" data-item="0">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="components/loading/Image-1.png"
        alt=""
      />
    </div>
    <div class="loading-item" data-item="1">
      <img
        class="loading-item__img"
        src="components/loading/Image-2-large.png"
        alt=""
      />
    </div>
    <div class="loading-item" data-item="2">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="components/loading/Image-3.png"
        alt=""
      />
    </div>
    <div class="loading-item" data-item="3">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="components/loading/Image-4.png"
        alt=""
      />
    </div>
  </div>

  <section class="about" id="site-content">
    <div class="about__content">
      <p class="about__text">
        Somos a Putadoce, uma confeitaria<br />
        de doces autorais de São Paulo,<br />
        feita por quem gosta de combinar<br />
        sabor com personalidade e ousadia.
      </p>
      <a class="about__cta" href="#">Peça no Goomer</a>
    </div>
  </section>

  <script src="components/loading/loading.js"></script>
  <script src="components/header/header.js"></script>
</body>
</html>
