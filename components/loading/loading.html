<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Putadoce — Loading Animation</title>
  <!--
    Entry loading animation, matching Figma frames 7:45, 7:58, 7:65, 7:72
    (file kAYJnyqg4kZczqNmndvmeE, "Putadoce | Website").
  -->
  <link rel="stylesheet" href="loading.css" />
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-item" data-item="0">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="Image-1.png"
        alt=""
      />
    </div>
    <div class="loading-item" data-item="1">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="Image-2.png"
        alt=""
      />
      <img
        class="loading-item__img loading-item__img--full"
        src="Image-2-large.png"
        alt=""
      />
    </div>
    <div class="loading-item" data-item="2">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="Image-3.png"
        alt=""
      />
    </div>
    <div class="loading-item" data-item="3">
      <img
        class="loading-item__img loading-item__img--thumb"
        src="Image-4.png"
        alt=""
      />
    </div>
  </div>

  <button class="loading-replay" id="replayButton" type="button">Replay</button>

  <script src="loading.js"></script>
</body>
</html>
