<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Putadoce — Nav Component</title>
  <!--
    Font note: the Figma frame uses "Bolota Bold" for the logo wordmark.
    Bolota is a commercial font not available on a public CDN, so this
    demo substitutes "Baloo 2" (a free, visually close rounded-bold font)
    as a fallback. Swap in the real Bolota font-face when it's available.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Inter:wght@500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="nav.css" />
</head>
<body>
  <header class="nav" data-name="Nav">
    <div class="nav__left">
      <a class="nav__logo" href="#" aria-label="Putadoce">
        <span class="nav__logo-word nav__logo-word--puta">PUTA</span>
        <span class="nav__logo-icon" aria-hidden="true">
          <svg viewBox="0 0 22 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 34C11 28 9.5 25 9.5 20" stroke="#FF2B00" stroke-width="3" stroke-linecap="round"/>
            <circle cx="11" cy="11" r="10.5" fill="#FF2B00"/>
            <path d="M11 3.2A7.8 7.8 0 1 1 5.2 8.8" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M11 6.4A4.8 4.8 0 1 1 7.7 10.4" stroke="#FFFFFF" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav__logo-word nav__logo-word--doce">DOCE</span>
      </a>

      <nav class="nav__menu" aria-label="Primary">
        <a class="nav__item" href="#">Item 1</a>
        <a class="nav__item" href="#">Item 1</a>
        <a class="nav__item" href="#">Item 1</a>
        <a class="nav__item" href="#">Item 1</a>
      </nav>
    </div>

    <button class="nav__toggle" type="button" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="#1A1A1A" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/>
      </svg>
    </button>
  </header>
</body>
</html>
